name: FanShim Controller
slug: fanshim
version: "1.0.0"
description: Controla ventoinha FanShim com base na temperatura da CPU

startup: services
boot: auto

arch:
  - aarch64
  - armv7
  - armhf

devices:
  - /dev/gpiomem

privileged:
  - GPIO

options:
  on_temperature: 60
  off_temperature: 50

schema:
  on_temperature: int
  off_temperature: int